name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:
  # Rebuild daily so the homepage "Readers" stat refreshes even without commits.
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, don't cancel in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.163.3
      HUGO_ENVIRONMENT: production
      TZ: America/New_York
    steps:
      - name: Install Hugo CLI (extended)
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Install Dart Sass
        run: sudo snap install dart-sass
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Go (required for Hugo modules)
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Fetch GoatCounter stats
        env:
          GOATCOUNTER_TOKEN: ${{ secrets.GOATCOUNTER_TOKEN }}
          GOATCOUNTER_CODE: zhenliu
        run: |
          mkdir -p data
          if [ -z "$GOATCOUNTER_TOKEN" ]; then
            echo "No GOATCOUNTER_TOKEN secret set; keeping existing data/stats.json"
            exit 0
          fi
          END=$(date -u +%Y-%m-%dT%H:00:00Z)
          RESP=$(curl -s --max-time 30 \
            -H "Authorization: Bearer $GOATCOUNTER_TOKEN" \
            -H "Content-Type: application/json" \
            "https://${GOATCOUNTER_CODE}.goatcounter.com/api/v0/stats/total?start=2024-01-01T00:00:00Z&end=${END}" || true)
          READERS=$(echo "$RESP" | jq -r '.total // empty')
          if [ -n "$READERS" ]; then
            printf '{\n  "readers": %s,\n  "updated_utc": "%s"\n}\n' "$READERS" "$END" > data/stats.json
            echo "Updated readers=$READERS"
          else
            echo "GoatCounter fetch failed or empty; keeping existing data/stats.json"
            echo "Response was: $RESP"
          fi
          cat data/stats.json
      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
