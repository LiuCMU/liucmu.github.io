{{/*
  Light/dark mode toggle, injected as an icon at the end of the nav menu
  (right after the last menu item, "Tags"). Done via JS so we don't fork the
  theme's site-header menu template. Paige loads Bootstrap Icons (bi-*).
*/}}
<script>
  (function () {
    function current() {
      return document.documentElement.getAttribute("data-bs-theme") || "light";
    }

    function build() {
      var menu = document.querySelector("#paige-site-menu ul.nav");
      if (!menu || document.getElementById("paige-theme-toggle")) return;

      var li = document.createElement("li");
      li.className = "nav-item";

      var btn = document.createElement("button");
      btn.type = "button";
      btn.id = "paige-theme-toggle";
      btn.className = "nav-link border-0 bg-transparent";
      btn.setAttribute("aria-label", "Toggle light and dark mode");

      var icon = document.createElement("i");
      icon.setAttribute("aria-hidden", "true");
      btn.appendChild(icon);
      li.appendChild(btn);
      menu.appendChild(li);

      function render() {
        icon.className = current() === "dark"
          ? "bi bi-moon-stars-fill"
          : "bi bi-sun-fill";
      }
      render();

      btn.addEventListener("click", function () {
        var next = current() === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-bs-theme", next);
        try { localStorage.setItem("paige-theme", next); } catch (e) {}
        render();
      });
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", build);
    } else {
      build();
    }
  })();
</script>
