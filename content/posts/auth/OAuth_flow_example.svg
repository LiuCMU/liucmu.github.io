<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 575" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5f6368"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="575" rx="10" fill="#ffffff"/>
  <text x="450" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#202124">OAuth 2.0 — Authorization Code Flow (delegated access)</text>

  <!-- actor boxes -->
  <g>
    <rect x="45"  y="45" width="130" height="36" rx="6" fill="#e8f0fe" stroke="#4285f4"/>
    <text x="110" y="68" text-anchor="middle" font-size="12" fill="#202124">You</text>

    <rect x="285" y="45" width="130" height="36" rx="6" fill="#e8f0fe" stroke="#4285f4"/>
    <text x="350" y="68" text-anchor="middle" font-size="12" fill="#202124">App (client)</text>

    <rect x="535" y="45" width="130" height="36" rx="6" fill="#e6f4ea" stroke="#34a853"/>
    <text x="600" y="68" text-anchor="middle" font-size="11" fill="#202124">Google Auth Server</text>

    <rect x="755" y="45" width="130" height="36" rx="6" fill="#e6f4ea" stroke="#34a853"/>
    <text x="820" y="68" text-anchor="middle" font-size="11" fill="#202124">Google Resource</text>
  </g>

  <!-- lifelines -->
  <g stroke="#dadce0" stroke-width="1" stroke-dasharray="4 4">
    <line x1="110" y1="81" x2="110" y2="512"/>
    <line x1="350" y1="81" x2="350" y2="512"/>
    <line x1="600" y1="81" x2="600" y2="512"/>
    <line x1="820" y1="81" x2="820" y2="512"/>
  </g>

  <!-- steps -->
  <g stroke="#5f6368" stroke-width="1.5" fill="none">
    <line x1="110" y1="130" x2="350" y2="130" marker-end="url(#arrow)"/>
    <line x1="350" y1="175" x2="600" y2="175" marker-end="url(#arrow)"/>
    <line x1="600" y1="220" x2="110" y2="220" marker-end="url(#arrow)" stroke-dasharray="5 4"/>
    <line x1="110" y1="265" x2="600" y2="265" marker-end="url(#arrow)"/>
    <line x1="600" y1="310" x2="350" y2="310" marker-end="url(#arrow)" stroke-dasharray="5 4"/>
    <line x1="350" y1="355" x2="600" y2="355" marker-end="url(#arrow)"/>
    <line x1="600" y1="400" x2="350" y2="400" marker-end="url(#arrow)" stroke-dasharray="5 4"/>
    <line x1="350" y1="445" x2="820" y2="445" marker-end="url(#arrow)"/>
    <line x1="820" y1="490" x2="350" y2="490" marker-end="url(#arrow)" stroke-dasharray="5 4"/>
  </g>

  <g font-size="12" fill="#202124" text-anchor="middle">
    <text x="230" y="124">1. Connect Google Calendar</text>
    <text x="475" y="169">2. Redirect: client_id, scope, state</text>
    <text x="355" y="214">3. Log in &amp; grant consent</text>
    <text x="355" y="259">4. Approve</text>
    <text x="475" y="304">5. Authorization code</text>
    <text x="475" y="349">6. Exchange code + client secret</text>
    <text x="475" y="394">7. Access token (no ID token)</text>
    <text x="585" y="439">8. Request data + access token</text>
    <text x="585" y="484">9. Calendar data</text>
  </g>

  <text x="450" y="545" text-anchor="middle" font-size="12" font-style="italic" fill="#5f6368">OAuth grants access to resources — it never tells the app who you are.</text>
</svg>
