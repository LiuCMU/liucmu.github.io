<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5f6368"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#d93025"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="500" rx="10" fill="#ffffff"/>
  <text x="450" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#202124">OpenID Connect (OIDC) — Login Flow</text>

  <!-- actor boxes -->
  <g>
    <rect x="75"  y="45" width="150" height="36" rx="6" fill="#e8f0fe" stroke="#4285f4"/>
    <text x="150" y="68" text-anchor="middle" font-size="12" fill="#202124">You</text>

    <rect x="375" y="45" width="150" height="36" rx="6" fill="#e8f0fe" stroke="#4285f4"/>
    <text x="450" y="68" text-anchor="middle" font-size="12" fill="#202124">App (client)</text>

    <rect x="675" y="45" width="150" height="36" rx="6" fill="#e6f4ea" stroke="#34a853"/>
    <text x="750" y="68" text-anchor="middle" font-size="12" fill="#202124">Google Auth Server</text>
  </g>

  <!-- lifelines -->
  <g stroke="#dadce0" stroke-width="1" stroke-dasharray="4 4">
    <line x1="150" y1="81" x2="150" y2="425"/>
    <line x1="450" y1="81" x2="450" y2="425"/>
    <line x1="750" y1="81" x2="750" y2="425"/>
  </g>

  <!-- steps -->
  <g stroke="#5f6368" stroke-width="1.5" fill="none">
    <line x1="150" y1="120" x2="450" y2="120" marker-end="url(#arrow)"/>
    <line x1="450" y1="160" x2="750" y2="160" marker-end="url(#arrow)"/>
    <line x1="750" y1="200" x2="150" y2="200" marker-end="url(#arrow)" stroke-dasharray="5 4"/>
    <line x1="150" y1="240" x2="750" y2="240" marker-end="url(#arrow)"/>
    <line x1="750" y1="280" x2="450" y2="280" marker-end="url(#arrow)" stroke-dasharray="5 4"/>
    <line x1="450" y1="320" x2="750" y2="320" marker-end="url(#arrow)"/>
  </g>

  <!-- highlighted ID-token response -->
  <path d="M750,360 L450,360" stroke="#d93025" stroke-width="2" fill="none" marker-end="url(#arrowRed)" stroke-dasharray="5 4"/>

  <!-- self message: verify ID token -->
  <path d="M450,392 L512,392 L512,410 L450,410" stroke="#5f6368" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <g font-size="12" fill="#202124" text-anchor="middle">
    <text x="300" y="114">1. Click "Login with Google"</text>
    <text x="600" y="154">2. Redirect: client_id, scope=openid, state</text>
    <text x="450" y="194">3. Log in &amp; grant consent</text>
    <text x="450" y="234">4. Approve</text>
    <text x="600" y="274">5. Authorization code</text>
    <text x="600" y="314">6. Exchange code + client secret</text>
  </g>

  <text x="600" y="354" text-anchor="middle" font-size="12" font-weight="700" fill="#d93025">7. Access token + ID token (JWT)</text>
  <text x="520" y="406" text-anchor="start" font-size="12" fill="#202124">8. Verify ID token, read name &amp; email</text>

  <text x="450" y="470" text-anchor="middle" font-size="12" font-style="italic" fill="#5f6368">The signed ID token is the OIDC addition — it proves who you are, which OAuth alone never does.</text>
</svg>
